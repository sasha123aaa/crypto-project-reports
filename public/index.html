<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Crypto Project Reports</title>
<style>:root{--bg:#1f2329;--bg2:#191d22;--line:rgba(255,255,255,.10);--text:#eef3ff;--muted:#a8b2c7;--shadow:0 18px 40px rgba(0,0,0,.28)}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;color:var(--text);background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%)}.wrap{max-width:1200px;margin:0 auto;padding:40px 24px}.hero{background:linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.02));border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:32px}.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:800}h1{margin:14px 0 0;font-size:56px;line-height:1;letter-spacing:-.03em}.sub{margin-top:16px;color:#dfe7fb;font-size:22px;line-height:1.4}.lead{margin-top:14px;color:var(--muted);font-size:16px;line-height:1.7;max-width:900px}.btn{display:inline-block;margin-top:14px;padding:12px 16px;border-radius:14px;background:rgba(255,255,255,.08);border:1px solid var(--line);color:#fff;text-decoration:none;font-weight:700}</style></head>
<body><div class="wrap"><section class="hero"><div class="eyebrow">Crypto Project Reports</div><h1>База разборов криптопроектов</h1><div class="sub">Библиотека клиентских отчетов по монетам и проектам</div><div class="lead">Сейчас внутри размещен ETH-разбор как эталонный шаблон для следующих проектов.</div><a class="btn" href="/reports/eth/">Открыть отчет ETH</a></section></div></body></html>
